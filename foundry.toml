[profile.default]
solc_version = "0.8.4"
optimizer = true
optimizer_runs = 200
libs = ["lib"]
remappings=[
    "@src/=src",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/"
]

[profile.ci]
verbosity = 4

# Exclude legacy/reference contracts from `forge fmt` (and `forge fmt --check` in CI)
[fmt]
ignore = [
    "contracts/libraries/SLisLibrary.sol",
    "contracts/oldContracts/ListaStakeManager.sol",
    "contracts/oldContracts/SnStakeManager.sol",
    "contracts/oldContracts/interfaces/INativeStaking.sol",
    "contracts/oldContracts/temp/SnStakeManager.sol",
]
